name: Auto-merge main into tenant-multi

on:
  push:
    branches: [main]

jobs:
  merge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: tenant-multi
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Merge main into tenant-multi
        run: |
          git fetch origin main
          git merge origin/main --no-edit

      - name: Push
        run: git push origin tenant-multi

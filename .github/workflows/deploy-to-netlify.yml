# After you push, this tells Netlify to start a **production build on Netlify’s servers**
# (same as clicking “Trigger deploy” in the Netlify UI). No project build runs on GitHub —
# avoids runner-only failures and uses the env vars already set on the Netlify site.
#
# Prerequisites:
#   1. In Netlify: Site → Build & deploy → Continuous deployment — connect this GitHub repo
#      and set the production branch (e.g. single-site or main) to match what you deploy.
#   2. GitHub repo secrets (Settings → Secrets and variables → Actions):
#      - NETLIFY_AUTH_TOKEN  (personal access token from Netlify)
#      - NETLIFY_YCODE_SITE_ID  OR  NETLIFY_SITE_ID  (site ID from Netlify → Site settings → General)

name: Deploy ycode-masjidweb to Netlify

on:
  push:
    branches: [single-site, tenant-multi]
  workflow_dispatch:

concurrency:
  group: deploy-ycode-masjidweb
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Trigger Netlify production build
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID_PRIMARY: ${{ secrets.NETLIFY_YCODE_SITE_ID }}
          NETLIFY_SITE_ID_ALT: ${{ secrets.NETLIFY_SITE_ID }}
        run: |
          set -euo pipefail
          SITE_ID="${NETLIFY_SITE_ID_PRIMARY:-${NETLIFY_SITE_ID_ALT:-}}"
          if [ -z "${NETLIFY_AUTH_TOKEN:-}" ]; then
            echo "::error::Missing repository secret NETLIFY_AUTH_TOKEN"
            exit 1
          fi
          if [ -z "$SITE_ID" ]; then
            echo "::error::Set NETLIFY_YCODE_SITE_ID or NETLIFY_SITE_ID in repository secrets"
            exit 1
          fi
          npx --yes netlify-cli deploy --prod --trigger --site="$SITE_ID"

# After you push, this tells Netlify to start a **production build on Netlify’s servers**
# (same as clicking “Trigger deploy” in the Netlify UI). No project build runs on GitHub —
# avoids runner-only failures and uses the env vars already set on the Netlify site.
#
# Prerequisites (pick one way to trigger):
#
# A) Build hook (simplest — recommended)
#    Netlify → Site configuration → Build & deploy → Continuous deployment → Build hooks
#    → Add build hook → name it "github-actions" → copy the URL.
#    GitHub → repo → Settings → Secrets → Actions → add NETLIFY_BUILD_HOOK_URL with that URL.
#
# B) Netlify CLI trigger
#    Connect this GitHub repo in Netlify (same section as above).
#    Secrets: NETLIFY_AUTH_TOKEN (personal access token) and NETLIFY_YCODE_SITE_ID or NETLIFY_SITE_ID.

name: Deploy ycode-masjidweb to Netlify

on:
  push:
    branches: [single-site, tenant-multi]
  workflow_dispatch:

concurrency:
  group: deploy-ycode-masjidweb
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Trigger Netlify production build
        env:
          NETLIFY_BUILD_HOOK_URL: ${{ secrets.NETLIFY_BUILD_HOOK_URL }}
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID_PRIMARY: ${{ secrets.NETLIFY_YCODE_SITE_ID }}
          NETLIFY_SITE_ID_ALT: ${{ secrets.NETLIFY_SITE_ID }}
        run: |
          set -euo pipefail
          if [ -n "${NETLIFY_BUILD_HOOK_URL:-}" ]; then
            echo "Triggering deploy via Netlify build hook"
            curl -fsS -X POST -H 'Content-Type: application/json' -d '{}' "$NETLIFY_BUILD_HOOK_URL"
            exit 0
          fi
          SITE_ID="${NETLIFY_SITE_ID_PRIMARY:-${NETLIFY_SITE_ID_ALT:-}}"
          if [ -z "${NETLIFY_AUTH_TOKEN:-}" ]; then
            echo "::error::Set NETLIFY_BUILD_HOOK_URL, or set NETLIFY_AUTH_TOKEN + NETLIFY_YCODE_SITE_ID (or NETLIFY_SITE_ID)"
            exit 1
          fi
          if [ -z "$SITE_ID" ]; then
            echo "::error::Set NETLIFY_BUILD_HOOK_URL, or set NETLIFY_YCODE_SITE_ID / NETLIFY_SITE_ID with NETLIFY_AUTH_TOKEN"
            exit 1
          fi
          npx --yes netlify-cli deploy --prod --trigger --site="$SITE_ID"

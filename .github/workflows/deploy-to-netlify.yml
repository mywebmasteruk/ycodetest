# Your Netlify site **masjidweb-multi** is already connected to this GitHub repo
# on branch **single-site**. Netlify builds and deploys on every push — no tokens
# or secrets are required in GitHub for that.
#
# This workflow only records a green check so Actions does not look “broken”.
# Real deploy status: https://app.netlify.com/ (site masjidweb-multi)

name: Netlify deploy (via Netlify Git integration)

on:
  push:
    branches: [single-site, tenant-multi]
  workflow_dispatch:

concurrency:
  group: netlify-deploy-notice
  cancel-in-progress: true

jobs:
  netlify-builds-this-repo:
    runs-on: ubuntu-latest
    steps:
      - name: Confirm Netlify handles production deploys
        run: |
          echo "::notice::Pushes to this branch trigger Netlify automatically (repo + branch linked in Netlify). Check the Netlify dashboard for build logs."
          echo "OK — no GitHub secret required for deploy."
